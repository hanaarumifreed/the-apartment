<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Apartment</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    canvas {
      display: block;
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }

    #title {
      position: fixed;
      bottom: 28px;
      left: 28px;
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.22);
      pointer-events: none;
      user-select: none;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #000;
      transition: opacity 0.8s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #loading-bar-track {
      width: 180px;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    #loading-bar-fill {
      height: 1px;
      width: 0%;
      background: rgba(255, 255, 255, 0.35);
      transition: width 0.2s ease;
    }

    #loading-label {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>

  <div id="loading">
    <div id="loading-label">Loading</div>
    <div id="loading-bar-track">
      <div id="loading-bar-fill"></div>
    </div>
  </div>

  <div id="title">The Apartment</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.178.0/three.module.js",
      "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { SplatMesh } from '@sparkjsdev/spark';

    // ── Renderer ──────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // ── Scene & Camera ────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
      72,
      window.innerWidth / window.innerHeight,
      0.01,
      1000
    );
    camera.position.set(0, 0, 0);

    // ── Splat ─────────────────────────────────────────────────────────────────
    const splat = new SplatMesh({ url: 'Polk Gulch.spz' });
    scene.add(splat);

    // Simulate loading progress while the splat decodes
    const loadingEl   = document.getElementById('loading');
    const barFill     = document.getElementById('loading-bar-fill');
    const loadingLabel = document.getElementById('loading-label');

    let loadProgress = 0;
    let splatReady = false;

    // Tick the bar forward speculatively; Spark doesn't expose fetch progress
    const progressInterval = setInterval(() => {
      if (splatReady) {
        clearInterval(progressInterval);
        return;
      }
      loadProgress = Math.min(loadProgress + Math.random() * 4, 88);
      barFill.style.width = loadProgress + '%';
    }, 120);

    // SplatMesh resolves once the splat is decoded and ready to render
    splat.waitForReady().then(() => {
      splatReady = true;
      clearInterval(progressInterval);
      barFill.style.width = '100%';

      setTimeout(() => {
        loadingEl.classList.add('fade-out');
        setTimeout(() => loadingEl.remove(), 900);
      }, 300);
    }).catch((err) => {
      console.error('Failed to load splat:', err);
      loadingLabel.textContent = 'Failed to load';
    });

    // ── FPS-style Navigation ───────────────────────────────────────────────────
    // Euler angles for camera orientation (yaw/pitch only, no roll)
    const euler = new THREE.Euler(0, 0, 0, 'YXZ');

    // --- Mouse drag to look ---
    let isDragging = false;
    let lastX = 0;
    let lastY = 0;
    const LOOK_SPEED = 0.0022;

    renderer.domElement.addEventListener('mousedown', (e) => {
      isDragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
    });

    window.addEventListener('mouseup', () => { isDragging = false; });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;

      euler.y -= dx * LOOK_SPEED;
      euler.x -= dy * LOOK_SPEED;
      // Clamp pitch so you can't flip upside-down
      euler.x = Math.max(-Math.PI * 0.48, Math.min(Math.PI * 0.48, euler.x));
      camera.quaternion.setFromEuler(euler);
    });

    // Touch drag to look (mobile)
    let lastTouchX = 0;
    let lastTouchY = 0;

    renderer.domElement.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    }, { passive: true });

    renderer.domElement.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1) {
        const dx = e.touches[0].clientX - lastTouchX;
        const dy = e.touches[0].clientY - lastTouchY;
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;

        euler.y -= dx * LOOK_SPEED;
        euler.x -= dy * LOOK_SPEED;
        euler.x = Math.max(-Math.PI * 0.48, Math.min(Math.PI * 0.48, euler.x));
        camera.quaternion.setFromEuler(euler);
      }
    }, { passive: true });

    // --- Scroll to move forward/backward ---
    const SCROLL_SPEED = 0.012;
    const forward = new THREE.Vector3();

    window.addEventListener('wheel', (e) => {
      // Get the direction the camera is facing
      forward.set(0, 0, -1).applyQuaternion(camera.quaternion);
      camera.position.addScaledVector(forward, -e.deltaY * SCROLL_SPEED);
    }, { passive: true });

    // --- WASD / arrow keys for finer movement ---
    const keys = {};
    window.addEventListener('keydown', (e) => { keys[e.code] = true; });
    window.addEventListener('keyup',   (e) => { keys[e.code] = false; });

    const MOVE_SPEED = 0.025;
    const right = new THREE.Vector3();
    const up    = new THREE.Vector3(0, 1, 0);

    function applyKeyMovement() {
      forward.set(0, 0, -1).applyQuaternion(camera.quaternion);
      right.crossVectors(forward, up).normalize();

      if (keys['KeyW'] || keys['ArrowUp'])    camera.position.addScaledVector(forward,  MOVE_SPEED);
      if (keys['KeyS'] || keys['ArrowDown'])  camera.position.addScaledVector(forward, -MOVE_SPEED);
      if (keys['KeyA'] || keys['ArrowLeft'])  camera.position.addScaledVector(right,   -MOVE_SPEED);
      if (keys['KeyD'] || keys['ArrowRight']) camera.position.addScaledVector(right,    MOVE_SPEED);
    }

    // ── Resize ────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Render Loop ───────────────────────────────────────────────────────────
    renderer.setAnimationLoop(() => {
      applyKeyMovement();
      renderer.render(scene, camera);
    });
  </script>
</body>
</html>
